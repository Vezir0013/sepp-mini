name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features

  audit:
    name: supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo-deny prüft Advisories (RustSec), Lizenzen, Bans und Quellen in einem Schritt
      # und respektiert deny.toml (inkl. begründeter Ignores). Lokal zusätzlich: `just audit`.
      - name: cargo-deny (advisories, licenses, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  release:
    name: release binary (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, audit]
    permissions:
      contents: write # nötig, um Assets an das Release zu hängen
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cross-Toolchain (Linux/musl)
        if: contains(matrix.target, 'linux')
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build (static, mit sqlite)
        run: cargo build --release -p sepp-cli --features sqlite --target ${{ matrix.target }}
      - name: Asset benennen (passend zu install.sh)
        run: cp "target/${{ matrix.target }}/release/sepp" "sepp-${{ matrix.target }}"
      - name: An GitHub-Release hängen
        uses: softprops/action-gh-release@v2
        with:
          files: sepp-${{ matrix.target }}
