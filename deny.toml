# cargo-deny: Supply-Chain-Gate (Lizenzen + bekannte Vulns + Quellen).
# Lauf: `cargo deny check`  (oder `just audit`).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # paste: unmaintained (kein Code-Defekt, kein sicheres Upgrade); nur transitiv via ratatui (TUI).
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Permissive Lizenzen, die für eine verteilbare Binary unproblematisch sind.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0", # webpki-roots (TLS-Wurzelzertifikate), permissiv
    # Eigene Projektlizenz der sepp-*-Crates (source-available, nicht-kommerziell) —
    # KEINE permissive Dependency-Lizenz, sondern unsere eigene; cargo-deny prüft auch
    # die Workspace-Member gegen diese Allowlist.
    "PolyForm-Noncommercial-1.0.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# Crates.io-Deps sind exakt gepinnt (`=x.y.z`). `wildcards` würde sonst die internen
# Pfad-Deps (`sepp-*`) fälschlich anschlagen (cargo-deny wendet allow-wildcard-paths nicht
# auf „public" Crates an) → daher "warn".
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
